<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Mobile -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">

    <title>KRAS</title>
    <!--link rel="stylesheet" href="style.css?v=20260305-3"-->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <select id="languageSelect">
        <option value="en">English</option>
        <option value="ru">Русский</option>
        <option value="he">עברית</option>
    </select>


    <form id="windowForm">

        <h1 data-i18n="title"></h1>

        <!-- Measurements -->
        <fieldset class="dimensions">
            <legend data-i18n="measurements"></legend>

            <div class="field">
                <div class="cell">
                    <span data-i18n="win_template" class="template-label"></span>
                    <select id="win_template">
                        <option data-i18n="flat_tmp" value="flat"></option>
                        <option data-i18n="bay_tmp" value="bay"></option>
                        <option data-i18n="bow_tmp" value="bow"></option>
                    </select>
                </div>
                <div class="cell">
                    <span data-i18n="unit" class="unit-label"></span>
                    <select id="unit">
                        <option data-i18n="meter" value="m"></option>
                        <option data-i18n="centimeter" value="cm"></option>
                        <option data-i18n="millimeter" value="mm" selected></option>
                    </select>
                </div>
            </div>

            <fieldset class="measure-fieldset" id="measureControls">
                <div class="measure-grid flat-only">
                    <div class="measure-list-label" data-i18n="width"></div>
                    <div class="measure-list-label" data-i18n="height"></div>
                    <ul id="widthList" class="measure-list"></ul>
                    <ul id="heightList" class="measure-list"></ul>
                    <div class="measure-row">
                        <span data-i18n="width"></span>
                        <input type="number" id="widthMeasure" step="10">
                        <button type="button" id="addWidth" data-i18n="add" aria-label=""></button>
                    </div>
                    <div class="measure-row">
                        <span data-i18n="height"></span>
                        <input type="number" id="heightMeasure" step="10">
                        <button type="button" id="addHeight" data-i18n="add" aria-label=""></button>
                    </div>
                </div>
                <fieldset class="section-controls sections-only hidden" id="sectionControls">
                <legend data-i18n="sections" id="sectionLegend"></legend>
                <div class="section-selector">
                    <span data-i18n="sections"></span>
                    <select id="sectionSelect">
                        <option value="0" data-i18n="left_sec"></option>
                        <option value="1" data-i18n="central_sec"></option>
                        <option value="2" data-i18n="right_sec"></option>
                    </select>
                    <button type="button" class="section-toggle-btn" data-section-toggle="0"></button>
                    <button type="button" class="section-toggle-btn" data-section-toggle="2"></button>
                </div>
                <div class="section-measure-grid">
                    <div class="section-measure" data-section-index="0">
                        <div class="section-measure-title">
                            <span data-i18n="left_sec"></span>
                        </div>
                        <button type="button" class="section-toggle-btn" data-section-toggle="0"></button>
                        <div class="measure-grid section-measure-grid-inner">
                            <div class="measure-list-label" data-i18n="width"></div>
                            <div class="measure-list-label" data-i18n="height"></div>
                            <ul id="sectionLeftWidthList" class="measure-list"></ul>
                            <ul id="sectionLeftHeightList" class="measure-list"></ul>
                            <div class="measure-row">
                                <span data-i18n="width"></span>
                                <input type="number" id="sectionLeftWidthMeasure" step="10" data-section="0" data-kind="widths">
                                <button type="button" id="addSectionLeftWidth" data-i18n="add" data-section="0" data-kind="widths" aria-label=""></button>
                            </div>
                            <div class="measure-row">
                                <span data-i18n="height"></span>
                                <input type="number" id="sectionLeftHeightMeasure" step="10" data-section="0" data-kind="heights">
                                <button type="button" id="addSectionLeftHeight" data-i18n="add" data-section="0" data-kind="heights" aria-label=""></button>
                            </div>
                        </div>
                    </div>
                    <div class="section-measure" data-section-index="1">
                        <div class="section-measure-title">
                            <span data-i18n="central_sec"></span>
                        </div>
                        <div class="measure-grid section-measure-grid-inner">
                            <div class="measure-list-label" data-i18n="width"></div>
                            <div class="measure-list-label" data-i18n="height"></div>
                            <ul id="sectionCenterWidthList" class="measure-list"></ul>
                            <ul id="sectionCenterHeightList" class="measure-list"></ul>
                            <div class="measure-row">
                                <span data-i18n="width"></span>
                                <input type="number" id="sectionCenterWidthMeasure" step="10" data-section="1" data-kind="widths">
                                <button type="button" id="addSectionCenterWidth" data-i18n="add" data-section="1" data-kind="widths" aria-label=""></button>
                            </div>
                            <div class="measure-row">
                                <span data-i18n="height"></span>
                                <input type="number" id="sectionCenterHeightMeasure" step="10" data-section="1" data-kind="heights">
                                <button type="button" id="addSectionCenterHeight" data-i18n="add" data-section="1" data-kind="heights" aria-label=""></button>
                            </div>
                        </div>
                    </div>
                    <div class="section-measure" data-section-index="2">
                        <div class="section-measure-title">
                            <span data-i18n="right_sec"></span>
                        </div>
                        <button type="button" class="section-toggle-btn" data-section-toggle="2"></button>
                        <div class="measure-grid section-measure-grid-inner">
                            <div class="measure-list-label" data-i18n="width"></div>
                            <div class="measure-list-label" data-i18n="height"></div>
                            <ul id="sectionRightWidthList" class="measure-list"></ul>
                            <ul id="sectionRightHeightList" class="measure-list"></ul>
                            <div class="measure-row">
                                <span data-i18n="width"></span>
                                <input type="number" id="sectionRightWidthMeasure" step="10" data-section="2" data-kind="widths">
                                <button type="button" id="addSectionRightWidth" data-i18n="add" data-section="2" data-kind="widths" aria-label=""></button>
                            </div>
                            <div class="measure-row">
                                <span data-i18n="height"></span>
                                <input type="number" id="sectionRightHeightMeasure" step="10" data-section="2" data-kind="heights">
                                <button type="button" id="addSectionRightHeight" data-i18n="add" data-section="2" data-kind="heights" aria-label=""></button>
                            </div>
                        </div>
                    </div>
                </div>
                </fieldset>
            </fieldset>

        </fieldset>

        <!-- Drawing -->
        <div class="designer">
            <div id="drawing">
                <svg id="windowSvg"
                    viewBox="0 0 600 300"
                    width="600"
                    height="300">

                    <defs>
                        <marker id="arrow"
                                markerWidth="10"
                                markerHeight="10"
                                refX="5"
                                refY="5"
                                orient="auto-start-reverse"
                                markerUnits="strokeWidth"
                                overflow="visible">
                            <path d="M0,0 L10,5 L0,10 Z" fill="#222"/>
                        </marker>
                    </defs>

                </svg>
            </div>
        </div>

        <fieldset class="specification" id="specification">
            <legend data-i18n="specification"></legend>
            <table id="specTable">
                <thead>
                    <tr>
                        <th data-i18n="spec_section"></th>
                        <th data-i18n="spec_width"></th>
                        <th data-i18n="spec_height"></th>
                    </tr>
                </thead>
                <tbody id="specTableBody"></tbody>
            </table>
        </fieldset>

        <!-- Printing -->
        <button type="button" onclick="PrintWindow()" data-i18n="print"></button>

    </form>

    <script src="app.js"></script>

</body>
</html>
