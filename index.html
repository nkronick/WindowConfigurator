<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Mobile -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">

    <title>Window Configurator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <select id="languageSelect">
        <option value="en">English</option>
        <option value="ru">Русский</option>
        <option value="he">עברית</option>
    </select>


    <form id="windowForm">

        <h1 data-i18n="title"></h1>

        <fieldset class="profile-system">
            <legend data-i18n="profile_system"></legend>

            <div class="cell">
                <span data-i18n="manufacturer"></span>
                <select id="manufacturerSelect"></select>
            </div>

            <div class="cell">
                <span data-i18n="profile_series"></span>
                <select id="profileSeriesSelect"></select>
            </div>
        </fieldset>

        <!-- Dimensions -->
        <fieldset class="dimensions">
            <legend data-i18n="dimensions"></legend>

            <div class="field">
                <div class="cell">
                    <span data-i18n="width"></span>
                    <input type="number" id="width" step="10">
                </div>
                <div id="widthError" class="error"></div>
            </div>

            <div class="field">
                <div class="cell">
                    <span data-i18n="height"></span>
                    <input type="number" id="height" step="10">
                </div>
                <div id="heightError" class="error"></div>
            </div>

            <div class="field">
                <div class="cell">
                    <span data-i18n="cnt_bays"></span>
                    <input type="number" id="cnt_bays" value="1" step="1" min="1">
                </div>
                <div id="cnt_baysError" class="error"></div>
            </div>

            <div class="field">
                <div class="cell checkbox-cell">
                    <span data-i18n="identical_bays"></span>
                    <input type="checkbox" id="identical_bays">
                </div>
                <div class="error" aria-hidden="true"></div>
            </div>

        </fieldset>

        <!-- Drawing -->
        <div class="designer">
            <div id="drawing">
                <svg id="windowSvg"
                    viewBox="0 0 600 300"
                    width="600"
                    height="300">

                    <defs>
                        <marker id="arrow"
                                markerWidth="10"
                                markerHeight="10"
                                refX="5"
                                refY="5"
                                orient="auto-start-reverse"
                                markerUnits="strokeWidth"
                                overflow="visible">
                            <path d="M0,0 L10,5 L0,10 Z" fill="#222"/>
                        </marker>
                    </defs>

                </svg>
            </div>

            <!-- Selected Bay Controls -->
            <div id="bayControls" hidden>
                <fieldset class="bay-controls-fieldset">
                    <legend data-i18n="bay_controls"></legend>

                    <div id="identicalBayWidth" class="bay-cell hidden">
                        <span data-i18n="width"></span>
                        <input type="number" id="bayWidth" step="10">
                    </div>
                    <div id="bayWidthError" class="error"></div>

                    <div id="identicalBayHeight" class="bay-cell hidden">
                        <span data-i18n="height"></span>
                        <input type="number" id="bayHeight" step="10">
                    </div>
                    <div id="bayHeightError" class="error"></div>

                    <div class="bay-cell">
                        <span data-i18n="opening"></span>
                        <select id="openingType">
                            <option data-i18n="fixed" value="fixed"></option>
                            <option data-i18n="casement" value="casement"></option>
                            <option data-i18n="hopper" value="hopper"></option>
                            <option data-i18n="tilt_turn" value="tilt_turn"></option>
                            <!--option data-i18n="transom" value="transom"></option-->
                            <option data-i18n="sliding" value="sliding"></option>
                        </select>
                    </div>

                    <div id="openingDirectionRow" class="bay-cell hidden">
                        <span data-i18n="opening_direction"></span>
                        <select id="openingDirection"></select>
                    </div>
                </fieldset>
            </div>
        </div>

        <!-- Specification Table -->
        <fieldset id="specification" class="specification">
            <legend data-i18n="specification"></legend>
            <table id="specTable">
                <thead>
                    <tr>
                        <th class="spec-col-tight" data-i18n="bay"></th>
                        <th class="spec-col-tight" data-i18n="opening"></th>
                        <th class="spec-col-tight" data-i18n="direction"></th>
                        <th class="spec-col-tight" data-i18n="width"></th>
                        <th class="spec-col-tight" data-i18n="height"></th>
                        <th>
                            <span data-i18n="windowFrameThicknessSpec"></span>
                            <span class="spec-subhead">L/R/T/B (mm)</span>
                        </th>
                        <th>
                            <span data-i18n="bayFrameThicknessSpec"></span>
                            <span class="spec-subhead">L/R/T/B (mm)</span>
                        </th>
                        <th class="spec-col-vertical-mullion" data-i18n="verticalMullion"></th>
                        <th class="spec-col-horizontal-mullion" data-i18n="horizontalMullion"></th>
                        <th data-i18n="sashOverlap"></th>
                        <th data-i18n="glassInset"></th>
                    </tr>
                </thead>
                <tbody id="specTableBody"></tbody>
            </table>
        </fieldset>

        <!-- Printing -->
        <button type="button" onclick="PrintWindow()" data-i18n="print"></button>

    </form>

    <script src="app.js"></script>

</body>
</html>
